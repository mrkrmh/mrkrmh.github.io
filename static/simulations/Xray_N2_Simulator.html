<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xray N2 Calibration Simulator</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>/* Same CSS as above */ body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #333; } .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); } h2 { text-align: center; color: #1e293b; } .controls { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; } .slider-group { display: flex; justify-content: space-between; align-items: center; } input[type=range] { width: 60%; } .description { font-size: 0.9em; color: #64748b; text-align: center; margin-bottom: 20px; }</style>
</head>
<body>
    <div class="container">
        <h2>X-ray Parameterized N₂ Calibration</h2>
        <p class="description">Demonstrating how the relationship between the [N II] diagnostic and true metallicity shifts intrinsically with 2-10 keV X-ray luminosity.</p>
        <div class="controls">
            <div class="slider-group">
                <label>Intrinsic 2-10 keV X-ray Luminosity (Log Lₓ): <span id="lx-val">42.5</span></label>
                <input type="range" id="lx-slider" min="41.0" max="45.0" step="0.5" value="42.5">
            </div>
        </div>
        <div id="plot"></div>
    </div>
    <script>
        const metallicity = [8.0, 8.2, 8.4, 8.6, 8.8, 9.0]; 
        function updatePlot() {
            const lx = parseFloat(document.getElementById('lx-slider').value);
            document.getElementById('lx-val').innerText = lx.toFixed(1);
            
            const n2Ratio = metallicity.map(z => 1.5 * (z - 8.0) - 1.0 + (lx - 42)*0.3); 
            const trace1 = { x: metallicity, y: n2Ratio, mode: 'lines+markers', name: `N₂ curve at Log Lx=${lx.toFixed(1)}`, line: {color: '#f97316', width: 3, shape: 'spline'} };

            const layout = { title: 'N2 Diagnostic Ratio vs Metallicity', xaxis: { title: '12 + log(O/H)' }, yaxis: { title: 'Log ([N II] λ6584 / Hα)' }, yaxis: {range: [-1.5, 1.5]} };
            Plotly.newPlot('plot', [trace1], layout, {responsive: true});
        }
        document.getElementById('lx-slider').addEventListener('input', updatePlot);
        updatePlot();
    </script>
</body>
</html>
