<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N2O2 Diagnostic Simulator</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1e293b; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; }
        .slider-group { display: flex; justify-content: space-between; align-items: center; }
        input[type=range] { width: 60%; }
        .description { font-size: 0.9em; color: #64748b; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>N₂O₂ Metallicity Diagnostic Calibration</h2>
        <p class="description">Demonstrating the robustness of the [N II]/[O II] ratio against X-ray luminosity variations compared to traditional strong-line diagnostics.</p>
        
        <div class="controls">
            <div class="slider-group">
                <label>Intrinsic X-ray Luminosity (Log Lₓ): <span id="lx-val">43.0</span></label>
                <input type="range" id="lx-slider" min="41.0" max="45.0" step="0.1" value="43.0">
            </div>
            <div class="slider-group">
                <label>Ionization Parameter (Log U): <span id="u-val">-2.5</span></label>
                <input type="range" id="u-slider" min="-3.5" max="-1.5" step="0.1" value="-2.5">
            </div>
        </div>

        <div id="plot"></div>
    </div>

    <script>
        const zValues = [0.1, 0.2, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0];
        const logZ = zValues.map(z => Math.log10(z));

        function calculateRatios(Lx, U) {
            // Simulated Physics: N2O2 is stable, traditional O3N2 fluctuates with Lx and U
            const n2o2 = logZ.map(lz => 0.8 * lz - 0.2 + (U * 0.05)); 
            const traditional = logZ.map(lz => -1.2 * lz + 1.5 + ((Lx - 43) * 0.5) - (U * 0.2));
            return { n2o2, traditional };
        }

        function updatePlot() {
            const Lx = parseFloat(document.getElementById('lx-slider').value);
            const U = parseFloat(document.getElementById('u-slider').value);
            
            document.getElementById('lx-val').innerText = Lx.toFixed(1);
            document.getElementById('u-val').innerText = U.toFixed(1);

            const ratios = calculateRatios(Lx, U);

            const trace1 = { x: logZ, y: ratios.n2o2, mode: 'lines+markers', name: 'N₂O₂ Calibration (Stable)', line: {color: '#2563eb', width: 3} };
            const trace2 = { x: logZ, y: ratios.traditional, mode: 'lines+markers', name: 'Traditional Diagnostic (Biased)', line: {color: '#ef4444', width: 2, dash: 'dash'} };

            const layout = {
                title: 'Diagnostic Ratio vs. Gas-Phase Metallicity',
                xaxis: { title: 'Log(Z / Z_sun)' },
                yaxis: { title: 'Log(Line Ratio)' },
                margin: { t: 40, b: 40, l: 50, r: 20 },
                legend: { orientation: 'h', y: -0.2 }
            };

            Plotly.newPlot('plot', [trace1, trace2], layout, {responsive: true});
        }

        document.getElementById('lx-slider').addEventListener('input', updatePlot);
        document.getElementById('u-slider').addEventListener('input', updatePlot);
        updatePlot(); // Initial render
    </script>
</body>
</html>
