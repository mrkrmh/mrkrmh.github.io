<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebular Structure Profiles (AGN vs H II)</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: "Times New Roman", Times, serif; background: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; }
        #plot { width: 100%; height: 750px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="plot"></div>
    </div>

    <script>
        // Linear interpolation function to perfectly match EPS data nodes
        function lerp(x, coords) {
            if (x <= coords[0][0]) return coords[0][1];
            if (x >= coords[coords.length-1][0]) return coords[coords.length-1][1];
            for (let i = 0; i < coords.length - 1; i++) {
                if (x >= coords[i][0] && x <= coords[i+1][0]) {
                    let x0 = coords[i][0], y0 = coords[i][1];
                    let x1 = coords[i+1][0], y1 = coords[i+1][1];
                    return y0 + (y1 - y0) * ((x - x0) / (x1 - x0));
                }
            }
            return 0;
        }

        // Exact Data Nodes mapped from the Cloudy EPS Output
        const nodes_hTe =  [[0,0.85], [0.96,0.85], [0.97,0.88], [0.98,0.0]];
        const nodes_hO2 =  [[0,1.0], [0.97,1.0], [0.98,0.0]];
        const nodes_hNe2 = [[0,0.85], [0.97,0.85], [0.98,0.0]];

        const nodes_aTe =  [[0,1.05], [0.05,0.92], [0.15,0.88], [0.4,0.88], [0.6,0.95], [0.8,1.15], [0.95,1.40], [0.98,1.2], [1.0,0.0]];
        const nodes_aO2 =  [[0,1.0], [0.3,0.98], [0.6,0.85], [0.8,0.5], [0.9,0.2], [0.96,0.05], [0.98,0.0]];
        const nodes_aNe2 = [[0,1.0], [0.2,0.98], [0.4,0.92], [0.55,0.85], [0.7,0.6], [0.85,0.2], [0.95,0.02], [0.98,0.0]];

        const x = [];
        const hTe=[], hO2=[], hNe2=[]; 
        const aTe=[], aO2=[], aNe2=[]; 
        
        // Generate 500 high-resolution points using the EPS nodes
        for(let i=0; i<=500; i++) {
            let xv = i/500;
            x.push(xv);
            
            hTe.push(lerp(xv, nodes_hTe));
            hO2.push(lerp(xv, nodes_hO2));
            hNe2.push(lerp(xv, nodes_hNe2));

            aTe.push(lerp(xv, nodes_aTe));
            aO2.push(lerp(xv, nodes_aO2));
            aNe2.push(lerp(xv, nodes_aNe2));
        }

        const lineAGN = { color: '#d32f2f', width: 2.5, shape: 'spline', smoothing: 1.3 }; // Red Solid (Smoothed)
        const lineHII = { color: '#1976d2', width: 2.5, dash: 'dash', shape: 'hv' }; // Blue Dashed (Step-like boundary)

        const traceNe_AGN = { x: x, y: aNe2, mode: 'lines', name: 'AGN', line: lineAGN, xaxis: 'x3', yaxis: 'y3', legendgroup: 'agn' };
        const traceNe_HII = { x: x, y: hNe2, mode: 'lines', name: 'H II region', line: lineHII, xaxis: 'x3', yaxis: 'y3', legendgroup: 'hii' };

        const traceO_AGN = { x: x, y: aO2, mode: 'lines', line: lineAGN, xaxis: 'x2', yaxis: 'y2', legendgroup: 'agn', showlegend: false };
        const traceO_HII = { x: x, y: hO2, mode: 'lines', line: lineHII, xaxis: 'x2', yaxis: 'y2', legendgroup: 'hii', showlegend: false };

        const traceTe_AGN = { x: x, y: aTe, mode: 'lines', line: lineAGN, xaxis: 'x', yaxis: 'y', legendgroup: 'agn', showlegend: false };
        const traceTe_HII = { x: x, y: hTe, mode: 'lines', line: lineHII, xaxis: 'x', yaxis: 'y', legendgroup: 'hii', showlegend: false };

        const data = [traceTe_AGN, traceTe_HII, traceO_AGN, traceO_HII, traceNe_AGN, traceNe_HII];

        const layout = {
            font: { family: '"Times New Roman", Times, serif', size: 16, color: 'black' },
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            margin: { t: 60, b: 60, l: 80, r: 40 },
            hovermode: 'x unified',
            legend: { orientation: 'h', x: 0.5, xanchor: 'center', y: 1.05 },
            
            xaxis: { title: '<b>R/R<sub>e</sub></b>', range: [0, 1.05], tick0: 0, dtick: 0.2, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 },
            yaxis: { title: '<b>T<sub>e</sub> (10<sup>4</sup> K)</b>', domain: [0, 0.333], range: [0.4, 1.8], tick0: 0.5, dtick: 0.5, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 },
            
            xaxis2: { anchor: 'y2', range: [0, 1.05], tick0: 0, dtick: 0.2, showticklabels: false, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 },
            yaxis2: { title: '<b>O<sup>2+</sup>/O</b>', domain: [0.333, 0.666], range: [-0.05, 1.05], tick0: 0, dtick: 0.5, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 },
            
            xaxis3: { anchor: 'y3', range: [0, 1.05], tick0: 0, dtick: 0.2, showticklabels: false, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 },
            yaxis3: { title: '<b>Ne<sup>2+</sup>/Ne</b>', domain: [0.666, 1.0], range: [-0.05, 1.05], tick0: 0, dtick: 0.5, showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 }
        };

        const config = { responsive: true, displayModeBar: false };
        Plotly.newPlot('plot', data, layout, config);
    </script>
</body>
</html>
