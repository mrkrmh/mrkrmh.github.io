<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebular Structure Profiles (AGN vs H II)</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: "Times New Roman", Times, serif; background: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; }
        #plot { width: 100%; height: 750px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="plot"></div>
    </div>

    <script>
        const x = [];
        const hTe=[], hO2=[], hNe2=[]; 
        const aTe=[], aO2=[], aNe2=[]; 
        
        for(let i=0; i<=200; i++) {
            let xv = i/200;
            x.push(xv);
            
            // H II Region (Stellar): High fraction up to the Stromgren boundary (R_e), then sharp drop
            let h_front = xv <= 0.98 ? 1 : Math.exp(-200 * (xv - 0.98));
            hO2.push(0.96 * h_front);
            hNe2.push(0.90 * h_front);
            hTe.push(0.85 * h_front);

            // AGN Region (Power Law): Gradual decline in the partially ionized zone
            let a_O = 0.98 * (1 - Math.pow(xv, 3)); 
            let a_Ne = 0.94 * (1 - Math.pow(xv, 2.5));
            aO2.push(Math.max(0, a_O));
            aNe2.push(Math.max(0, a_Ne));
            
            // AGN Te: Secondary temperature peak due to deep X-ray heating
            let a_T = 0.95 - 0.15*xv + 0.55 * Math.exp(-40 * Math.pow(xv - 0.9, 2));
            if (xv > 0.98) a_T = a_T * Math.exp(-150 * (xv - 0.98));
            aTe.push(a_T);
        }

        const lineAGN = { color: '#d32f2f', width: 2.5 }; // Red Solid
        const lineHII = { color: '#1976d2', width: 2.5, dash: 'dash' }; // Blue Dashed

        // Assigning specific X and Y axes to create perfect stacked bounding boxes
        const traceNe_AGN = { x: x, y: aNe2, mode: 'lines', name: 'AGN', line: lineAGN, xaxis: 'x3', yaxis: 'y3', legendgroup: 'agn' };
        const traceNe_HII = { x: x, y: hNe2, mode: 'lines', name: 'H II region', line: lineHII, xaxis: 'x3', yaxis: 'y3', legendgroup: 'hii' };

        const traceO_AGN = { x: x, y: aO2, mode: 'lines', line: lineAGN, xaxis: 'x2', yaxis: 'y2', legendgroup: 'agn', showlegend: false };
        const traceO_HII = { x: x, y: hO2, mode: 'lines', line: lineHII, xaxis: 'x2', yaxis: 'y2', legendgroup: 'hii', showlegend: false };

        const traceTe_AGN = { x: x, y: aTe, mode: 'lines', line: lineAGN, xaxis: 'x', yaxis: 'y', legendgroup: 'agn', showlegend: false };
        const traceTe_HII = { x: x, y: hTe, mode: 'lines', line: lineHII, xaxis: 'x', yaxis: 'y', legendgroup: 'hii', showlegend: false };

        const data = [traceTe_AGN, traceTe_HII, traceO_AGN, traceO_HII, traceNe_AGN, traceNe_HII];

        // Layout perfectly mimics PGPLOT publication style
        const layout = {
            font: { family: '"Times New Roman", Times, serif', size: 16, color: 'black' },
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            margin: { t: 60, b: 60, l: 80, r: 40 },
            hovermode: 'x unified',
            legend: { orientation: 'h', x: 0.5, xanchor: 'center', y: 1.05 },
            
            // BOTTOM PANEL (Te)
            xaxis: { 
                title: '<b>R/R<sub>e</sub></b>', range: [0, 1.05], tick0: 0, dtick: 0.2,
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            },
            yaxis: { 
                title: '<b>T<sub>e</sub> (10<sup>4</sup> K)</b>', domain: [0, 0.333], range: [0.4, 1.6],
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            },
            
            // MIDDLE PANEL (O2+/O)
            xaxis2: { 
                anchor: 'y2', range: [0, 1.05], tick0: 0, dtick: 0.2, showticklabels: false,
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            },
            yaxis2: { 
                title: '<b>O<sup>2+</sup>/O</b>', domain: [0.333, 0.666], range: [-0.05, 1.05],
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            },
            
            // TOP PANEL (Ne2+/Ne)
            xaxis3: { 
                anchor: 'y3', range: [0, 1.05], tick0: 0, dtick: 0.2, showticklabels: false,
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            },
            yaxis3: { 
                title: '<b>Ne<sup>2+</sup>/Ne</b>', domain: [0.666, 1.0], range: [-0.05, 1.05],
                showgrid: false, zeroline: false, linecolor: 'black', linewidth: 1.5, mirror: 'ticks', ticks: 'inside', ticklen: 6 
            }
        };

        const config = { responsive: true, displayModeBar: false };
        Plotly.newPlot('plot', data, layout, config);
    </script>
</body>
</html>
