<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Abundance Discrepancy Simulator</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1e293b; margin-bottom: 0.5rem; }
        .description { font-size: 0.9em; color: #64748b; text-align: center; margin-top: 0; margin-bottom: 20px; }
        .controls { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1em; font-weight: 500; cursor: pointer; color: #0f172a; background-color: #fff; width: 80%; max-width: 400px; }
        .stats-box { margin-top: 10px; font-size: 0.9em; font-weight: 600; color: #0369a1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Neon Abundance Discrepancy (D)</h2>
        <p class="description">Comparing the Direct Method (Optical) against the Infrared benchmark for 15 Seyfert 2 galaxies.</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="assumption-select" style="font-weight: 600; color: #334155;">Direct Method Zone Assumption:</label>
                <select id="assumption-select">
                    <option value="traditional">Traditional Assumption (T = Tₑ[O III])</option>
                    <option value="corrected">Corrected Ne²⁺ Zone (T = Tₑ[Ne III])</option>
                </select>
            </div>
            <div class="stats-box" id="stats-text">Mean Discrepancy: ~0.39 dex (Severe Underestimation)</div>
        </div>
        
        <div id="plot"></div>
    </div>

    <script>
        // Synthetic data based on the ~3x reduction finding in stab2610.pdf (Figure 5)
        const galaxies = Array.from({length: 15}, (_, i) => `Gal ${i+1}`);
        
        // Traditional T_e[O III] assumption yields large discrepancies
        const tradData = [0.32, 0.41, 0.28, 0.50, 0.35, 0.45, 0.38, 0.31, 0.48, 0.40, 0.33, 0.42, 0.37, 0.49, 0.36];
        
        // Corrected T_e[Ne III] assumption pulls everything closer to 0 (IR benchmark)
        const corrData = [0.11, 0.15, 0.08, 0.20, 0.12, 0.18, 0.14, 0.10, 0.19, 0.16, 0.12, 0.17, 0.13, 0.21, 0.12];

        function updatePlot() {
            const selection = document.getElementById('assumption-select').value;
            const statsText = document.getElementById('stats-text');
            
            let yData, markerColor, traceName;

            if (selection === 'traditional') {
                yData = tradData;
                markerColor = '#ef4444'; // Red for severe discrepancy
                traceName = 'Traditional Tₑ[O III]';
                statsText.innerHTML = 'Mean Discrepancy: ~0.39 dex (Severe Underestimation)';
                statsText.style.color = '#b91c1c';
            } else {
                yData = corrData;
                markerColor = '#10b981'; // Green for improved accuracy
                traceName = 'Corrected Tₑ[Ne III]';
                statsText.innerHTML = 'Mean Discrepancy: ~0.14 dex (Discrepancy reduced by factor of ~2.8)';
                statsText.style.color = '#047857';
            }

            const trace = { 
                x: galaxies, 
                y: yData, 
                mode: 'markers', 
                type: 'scatter',
                name: traceName, 
                marker: { color: markerColor, size: 12, line: { color: 'white', width: 2 } }
            };

            // The 'benchmark' zero line (perfect agreement with IR)
            const zeroLine = {
                x: [galaxies[0], galaxies[galaxies.length - 1]],
                y: [0, 0],
                mode: 'lines',
                name: 'IR Benchmark (Zero Discrepancy)',
                line: { color: '#64748b', width: 2, dash: 'dash' },
                hoverinfo: 'none'
            };

            const layout = { 
                title: 'D = log(Ne²⁺/H⁺)_IR - log(Ne²⁺/H⁺)_Te', 
                xaxis: { title: 'Galaxy Sample', showticklabels: false }, 
                yaxis: { title: 'Discrepancy (dex)', range: [-0.05, 0.6] },
                margin: { t: 40, b: 40, l: 60, r: 20 },
                legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' },
                hovermode: 'closest'
            };
            
            // Plotly.react allows smooth transitioning of the points
            Plotly.react('plot', [zeroLine, trace], layout, {responsive: true});
        }

        document.getElementById('assumption-select').addEventListener('change', updatePlot);
        
        // Initial render
        updatePlot();
    </script>
</body>
</html>
